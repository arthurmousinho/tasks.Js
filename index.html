<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tasks.Js</title>

    <!-- Link CSS -->
    <link rel="stylesheet" href="style.css">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

</head>
<body>
    <main>
        <div class="timer-container">
            <p id="timer">25:00</p>
            <button onclick="Timer.startTimer()" id="timer-button">Iniciar Sessão</button>
        </div>

        <div class="add-task-container">
            <input type="text" placeholder="Nova Tarefa" id="taskNameInput" >
            <button id="add-task-button" type="submit" onclick="Tasks.setTask()">
                Add
            </button>
        </div>

        <section class="tasks-container">
           <!-- <div class='task'>
                <div>
                    <img src="assets/check.svg" alt="check">
                    <span>Teste</span>
                </div>
                <img src="assets/remove.svg" alt="remove">
            </div>  -->
        </section>
    </main>

  <script src="./script.js" defer></script>  
</body>
</html>
